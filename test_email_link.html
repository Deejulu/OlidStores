<!DOCTYPE html>
<html>
<head>
    <title>Test Email Link</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-light p-5">
    <h2>Email Link Test</h2>
    
    <div class="mb-4">
        <h4>Test 1: Plain text link</h4>
        <a href="mailto:dokonkwo12@gmail.com">Click here to email</a>
    </div>
    
    <div class="mb-4">
        <h4>Test 2: Icon with link (current implementation)</h4>
        <a href="mailto:dokonkwo12@gmail.com" class="text-light text-decoration-none" title="Email">
            <i class="fas fa-envelope fa-2x"></i>
        </a>
    </div>
    
    <div class="mb-4">
        <h4>Test 3: Icon with pointer cursor</h4>
        <a href="mailto:dokonkwo12@gmail.com" class="text-light text-decoration-none" title="Email" style="cursor: pointer;">
            <i class="fas fa-envelope fa-2x" style="pointer-events: none;"></i>
        </a>
    </div>
    
    <div class="mb-4">
        <h4>Info:</h4>
        <p>If none of these work, your system might not have a default email client configured.</p>
        <p>Email address: dokonkwo12@gmail.com</p>
    </div>
</body>
</html>
